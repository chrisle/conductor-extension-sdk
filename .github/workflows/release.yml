# Triggered on every push to main.
#
# The deploy skill bumps the version locally before pushing, so this
# workflow only builds and publishes — no version bump in CI.
#
# 1. Builds the SDK (tsc).
# 2. Publishes to npm as @conductor/extension-sdk.
# 3. Creates a GitHub Release tagged v<version> with the npm tarball attached.
#
# Required GitHub secrets:
#   NPM_TOKEN   npm automation token with publish rights on @conductor

name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Resolve version
        id: ver
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Skip if tag already exists
        id: check
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ steps.ver.outputs.version }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install
        if: steps.check.outputs.exists == 'false'
        run: npm ci

      - name: Build
        if: steps.check.outputs.exists == 'false'
        run: npm run build

      - name: Pack tarball
        if: steps.check.outputs.exists == 'false'
        run: npm pack

      # TODO: re-enable once NPM_TOKEN is configured in repo secrets.
      # - name: Publish to npm
      #   if: steps.check.outputs.exists == 'false'
      #   env:
      #     NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      #   run: npm publish --access public

      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.ver.outputs.version }}" \
            --title "v${{ steps.ver.outputs.version }}" \
            --notes-file CHANGELOG.md \
            *.tgz
